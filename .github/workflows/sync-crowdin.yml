name: Sync Crowdin translations

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: crowdin-sync-translations
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  crowdin-download:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - crowdin: ja
            repo: ja-JP
          - crowdin: zh-CN
            repo: zh-HANS
          - crowdin: zh-TW
            repo: zh-HANT
          - crowdin: ko
            repo: ko-KR
          - crowdin: fr
            repo: fr-FR
          - crowdin: ru
            repo: ru-RU
          - crowdin: es-ES
            repo: es-ES

    steps:
      - uses: actions/checkout@v4

      - name: Sync Crowdin translations for ${{ matrix.repo }}
        uses: crowdin/github-action@v2
        with:
          crowdin_branch_name: main
          upload_sources: false
          upload_translations: false

          download_translations: true
          download_language: ${{ matrix.crowdin }}
          download_translations_args: "--all"

          skip_untranslated_strings: true
          #   skip_untranslated_files: true
          export_only_approved: false

          localization_branch_name: thirdparty/crowdin-${{ matrix.repo }}
          create_pull_request: true
          pull_request_title: "translate(${{ matrix.repo }}): sync ${{ matrix.repo }} translations"
          pull_request_body: |
            Automated Crowdin translation update.

            Language: ${{ matrix.repo }}
          pull_request_base_branch_name: main
          pull_request_labels: "crowdin"
          commit_message: "translate(${{ matrix.repo }}): sync ${{ matrix.repo }} translations"

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CROWDIN_PROJECT_ID: ${{ secrets.CROWDIN_PROJECT_ID }}
          CROWDIN_PERSONAL_TOKEN: ${{ secrets.CROWDIN_PERSONAL_TOKEN }}
